services:
  - type: web
    name: pos-muebleria
    env: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MEDIA_ROOT
        value: /opt/render/project/src/static/img/productos
      - key: DATABASE_URL
        fromDatabase:
          name: pos-muebleria-db
          property: connectionString

databases:
  - name: pos-muebleria-db
    plan: free
