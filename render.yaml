services:
  - type: web
    name: pos-muebleria
    env: python
    plan: starter
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python render_predeploy.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    disk:
      name: pos-media
      mountPath: /opt/render/project/src/uploads
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MEDIA_ROOT
        value: /opt/render/project/src/uploads/productos
      - key: DATABASE_URL
        fromDatabase:
          name: pos-muebleria-db
          property: connectionString

databases:
  - name: pos-muebleria-db
    plan: starter
